logger:

api:
  encryption:
    key: !secret ha_api_encryption_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: !secret hotspot_ssid
    password: !secret hotspot_password

captive_portal:

web_server:
  port: 80

interval:
  - interval: 5min
    then:
      - logger.log: "Healthcheck: System running!"
